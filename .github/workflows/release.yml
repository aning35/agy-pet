name: Cross-Platform Release

on:
  push:
    tags:
      - 'v*' # Trigger automatically when you push a tag like v1.0.0
  workflow_dispatch: # Allow manual trigger from GitHub Actions tab

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      - name: Build Windows EXE
        run: |
          pyinstaller --clean --noconfirm --onefile --windowed --add-data "assets/sounds;assets/sounds" --add-data "assets/gifs;assets/gifs" --add-data "assets/tray_icon.png;assets" --icon="assets/icon.ico" --name AgyPet src/app.py
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AgyPet-Windows
          path: dist/AgyPet.exe

  build-macos:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-15-intel, macos-latest]
        include:
          - os: macos-15-intel
            arch: x86_64
          - os: macos-latest
            arch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller dmgbuild
      - name: Build macOS App
        run: |
          pyinstaller --clean --noconfirm --windowed \
            --add-data "assets/sounds:assets/sounds" \
            --add-data "assets/gifs:assets/gifs" \
            --add-data "assets/tray_icon.png:assets" \
            --icon="assets/icon.icns" \
            --name AgyPet \
            src/app.py
          plutil -replace LSUIElement -bool true dist/AgyPet.app/Contents/Info.plist || plutil -insert LSUIElement -bool true dist/AgyPet.app/Contents/Info.plist
          plutil -replace NSBluetoothAlwaysUsageDescription -string "AgyPet needs Bluetooth access to connect to your smart pet hardware." dist/AgyPet.app/Contents/Info.plist || plutil -insert NSBluetoothAlwaysUsageDescription -string "AgyPet needs Bluetooth access to connect to your smart pet hardware." dist/AgyPet.app/Contents/Info.plist
          plutil -replace NSBluetoothPeripheralUsageDescription -string "AgyPet needs Bluetooth access to connect to your smart pet hardware." dist/AgyPet.app/Contents/Info.plist || plutil -insert NSBluetoothPeripheralUsageDescription -string "AgyPet needs Bluetooth access to connect to your smart pet hardware." dist/AgyPet.app/Contents/Info.plist
          codesign --force --deep --sign - dist/AgyPet.app
      - name: Create DMG
        run: |
          # Use dmgbuild to create a beautifully styled DMG
          dmgbuild -s settings.py "AgyPet" AgyPet-macOS-${{ matrix.arch }}.dmg
      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AgyPet-macOS-${{ matrix.arch }}
          path: AgyPet-macOS-${{ matrix.arch }}.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      - name: Build Linux Executable
        run: |
          pyinstaller --clean --noconfirm --onefile --windowed --add-data "assets/sounds:assets/sounds" --add-data "assets/gifs:assets/gifs" --add-data "assets/tray_icon.png:assets" --name AgyPet-Linux src/app.py
      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AgyPet-Linux
          path: dist/AgyPet-Linux

  create-release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: release-artifacts/*
          generate_release_notes: true
